<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desktop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="desktop">

  <div class="icon" onclick="openWindow('win1')">
    <img src="https://cdn-icons-png.flaticon.com/512/25/25694.png">
    <div>文件</div>
  </div>

  <div class="icon" onclick="openWindow('win2')">
    <img src="https://cdn-icons-png.flaticon.com/512/565/565547.png">
    <div>设置</div>
  </div>

</div>

<div class="window" id="win1">
  <div class="titlebar">
    文件管理器
    <button onclick="closeWindow('win1')">X</button>
  </div>
  <div class="content">
    文件内容
  </div>
</div>

<div class="window" id="win2">
  <div class="titlebar">
    设置
    <button onclick="closeWindow('win2')">X</button>
  </div>
  <div class="content">
    设置内容
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
